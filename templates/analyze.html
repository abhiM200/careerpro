<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyze Resume — CareerPro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050810; color: #f1f5f9; font-family: 'DM Sans', sans-serif; }
nav { background: #0c1220; border-bottom: 1px solid #1e2d45; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; }
.logo span { color: #2563eb; }
.nav-right { display: flex; gap: 12px; }
.btn-sm { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; text-decoration: none; border: 1px solid #1e2d45; color: #94a3b8; cursor: pointer; background: transparent; }
.btn-sm:hover { border-color: #2563eb; color: #60a5fa; }
.main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.sub { color: #64748b; margin-bottom: 36px; }
.upload-form { background: #0c1220; border: 1px solid #1e2d45; border-radius: 16px; padding: 36px; margin-bottom: 32px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group.full { grid-column: 1/-1; }
label { font-size: 14px; font-weight: 500; color: #94a3b8; }
.upload-zone { border: 2px dashed #1e2d45; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
.upload-zone:hover, .upload-zone.drag { border-color: #2563eb; background: rgba(37,99,235,0.05); }
.upload-icon { font-size: 36px; margin-bottom: 12px; }
.upload-text { color: #64748b; font-size: 14px; }
.upload-text strong { color: #60a5fa; }
input[type="file"] { display: none; }
textarea { width: 100%; padding: 12px 16px; background: #111827; border: 1px solid #1e2d45; border-radius: 10px; color: #f1f5f9; font-size: 14px; outline: none; resize: vertical; min-height: 120px; transition: border-color 0.2s; }
textarea:focus { border-color: #2563eb; }
input[type="text"] { width: 100%; padding: 12px 16px; background: #111827; border: 1px solid #1e2d45; border-radius: 10px; color: #f1f5f9; font-size: 14px; outline: none; }
input[type="text"]:focus { border-color: #2563eb; }
.btn-analyze { width: 100%; padding: 16px; background: linear-gradient(135deg, #2563eb, #7c3aed); color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 24px; }
.btn-analyze:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,0.3); }
.btn-analyze:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
/* RESULTS */
.results { display: none; }
.score-hero { background: linear-gradient(135deg, #0f2044, #1a1030); border: 1px solid #2563eb44; border-radius: 16px; padding: 40px; text-align: center; margin-bottom: 24px; }
.score-num { font-family: 'Syne', sans-serif; font-size: 80px; font-weight: 800; line-height: 1; }
.score-label { color: #94a3b8; font-size: 16px; margin-top: 8px; }
.score-tier { display: inline-block; padding: 6px 20px; border-radius: 100px; font-weight: 700; font-size: 14px; margin-top: 16px; }
.score-bar-wrap { background: #1e2d45; border-radius: 8px; height: 10px; margin-top: 20px; overflow: hidden; }
.score-bar { height: 100%; border-radius: 8px; transition: width 1s ease; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.card { background: #0c1220; border: 1px solid #1e2d45; border-radius: 14px; padding: 24px; }
.card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.tag { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 12px; margin: 3px; }
.tag-green { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
.tag-red { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
.tag-blue { background: rgba(37,99,235,0.1); color: #60a5fa; border: 1px solid rgba(37,99,235,0.2); }
.job-card { background: #111827; border-radius: 10px; padding: 16px; margin-bottom: 10px; }
.job-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.job-title { font-weight: 600; }
.job-score { font-weight: 700; }
.job-bar { background: #1e2d45; border-radius: 4px; height: 4px; overflow: hidden; }
.job-bar-fill { height: 100%; border-radius: 4px; }
.sugg-card { border-left: 3px solid; border-radius: 8px; padding: 14px; margin-bottom: 10px; background: #111827; }
.sugg-title { font-weight: 600; margin-bottom: 4px; }
.sugg-detail { color: #94a3b8; font-size: 13px; }
.linkedin-card { background: #0c1220; border: 1px solid #1e2d45; border-radius: 14px; padding: 24px; margin-bottom: 24px; }
.linkedin-tip { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1e2d4522; }
.linkedin-tip:last-child { border: none; }
.tip-icon { font-size: 20px; flex-shrink: 0; }
.tip-body h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.tip-body p { color: #64748b; font-size: 13px; }
.priority-high { color: #f87171; font-size: 11px; font-weight: 700; }
.priority-med { color: #f59e0b; font-size: 11px; font-weight: 700; }
.loading { text-align: center; padding: 60px; display: none; }
.spinner { width: 48px; height: 48px; border: 3px solid #1e2d45; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 640px) { .form-grid, .grid2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<nav>
  <div class="logo">Career<span>Pro</span></div>
  <div class="nav-right">
    <a href="/dashboard" class="btn-sm">← Dashboard</a>
    <a href="/api/logout" class="btn-sm">Logout</a>
  </div>
</nav>
<div class="main">
  <h1>🎯 Analyze Your Resume</h1>
  <p class="sub">Upload your resume and paste the job description to get your full AI analysis</p>

  <div class="upload-form">
    <div class="form-grid">
      <div class="form-group full">
        <label>Resume File (PDF or DOCX)</label>
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="dragOver(event)" ondrop="dropFile(event)" ondragleave="dragLeave(event)">
          <div class="upload-icon">📄</div>
          <div class="upload-text"><strong>Click to upload</strong> or drag & drop</div>
          <div class="upload-text" id="fileName" style="margin-top:8px;color:#60a5fa;"></div>
        </div>
        <input type="file" id="fileInput" accept=".pdf,.docx,.doc" onchange="fileSelected(this)">
      </div>
      <div class="form-group">
        <label>LinkedIn Profile URL (optional)</label>
        <input type="text" id="linkedinUrl" placeholder="https://linkedin.com/in/yourname" />
      </div>
      <div class="form-group full">
        <label>Job Description (paste here)</label>
        <textarea id="jobDesc" placeholder="Paste the full job description here — e.g. 'We are looking for a Python developer with 3+ years experience in Flask, REST APIs, and SQL...'"></textarea>
      </div>
    </div>
    <button class="btn-analyze" id="analyzeBtn" onclick="doAnalyze()">🚀 Analyze My Resume</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color:#64748b;">Analyzing your resume with AI...</p>
    <p style="color:#1e2d45;font-size:13px;margin-top:8px;">This takes 10–30 seconds</p>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
let selectedFile = null;

function fileSelected(input) {
  if (input.files[0]) {
    selectedFile = input.files[0];
    document.getElementById('fileName').textContent = '✓ ' + selectedFile.name;
  }
}
function dragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag'); }
function dragLeave(e) { document.getElementById('dropZone').classList.remove('drag'); }
function dropFile(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) { selectedFile = file; document.getElementById('fileName').textContent = '✓ ' + file.name; }
}

async function doAnalyze() {
  if (!selectedFile) { alert('Please upload your resume first!'); return; }
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = '⏳ Analyzing...';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  const formData = new FormData();
  formData.append('resume', selectedFile);
  formData.append('job_description', document.getElementById('jobDesc').value || 'software engineer python developer');
  formData.append('linkedin_url', document.getElementById('linkedinUrl').value);

  try {
    const res = await fetch('/api/analyze', { method: 'POST', body: formData });
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    if (data.error) { alert('Error: ' + data.error); }
    else { renderResults(data); }
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    alert('Something went wrong. Try again.');
  }
  btn.disabled = false; btn.textContent = '🚀 Analyze My Resume';
}

function renderResults(data) {
  const ats = data.ats_score || {};
  const score = ats.total_score || 0;
  const tier = ats.tier || 'N/A';
  const matched = ats.matched_keywords || [];
  const missing = ats.missing_keywords || [];
  const jobs = data.job_matches || [];
  const suggestions = data.suggestions || {};
  const parsed = data.parsed_resume || {};
  const linkedin = data.linkedin_feedback;

  const scoreColor = score >= 80 ? '#10b981' : score >= 65 ? '#3b82f6' : score >= 50 ? '#f59e0b' : '#ef4444';
  const tierBg = score >= 80 ? 'rgba(16,185,129,0.1)' : score >= 65 ? 'rgba(37,99,235,0.1)' : score >= 50 ? 'rgba(245,158,11,0.1)' : 'rgba(239,68,68,0.1)';

  const skillsHtml = (parsed.skills || []).map(s => `<span class="tag tag-blue">${s}</span>`).join('');
  const matchedHtml = matched.map(k => `<span class="tag tag-green">✓ ${k}</span>`).join('') || '<span style="color:#64748b">None matched</span>';
  const missingHtml = missing.map(k => `<span class="tag tag-red">✗ ${k}</span>`).join('') || '<span style="color:#10b981">All matched! ✓</span>';

  const jobsHtml = jobs.slice(0,5).map(j => {
    const c = j.match_score >= 70 ? '#10b981' : j.match_score >= 50 ? '#f59e0b' : '#ef4444';
    return `<div class="job-card">
      <div class="job-header"><span class="job-title">${j.title}</span><span class="job-score" style="color:${c}">${Math.round(j.match_score)}%</span></div>
      <div style="color:#64748b;font-size:12px;margin-bottom:8px;">💰 ${j.avg_salary || 'N/A'} · 📈 ${j.demand || 'N/A'}</div>
      <div class="job-bar"><div class="job-bar-fill" style="width:${j.match_score}%;background:${c};"></div></div>
    </div>`;
  }).join('');

  const allSugg = [...(suggestions.critical||[]), ...(suggestions.improvements||[]), ...(suggestions.skill_additions||[])];
  const suggHtml = allSugg.slice(0,6).map(s => {
    const c = s.impact === 'High' ? '#ef4444' : '#f59e0b';
    return `<div class="sugg-card" style="border-color:${c}">
      <div class="sugg-title">${s.icon||'💡'} ${s.title}</div>
      <div class="sugg-detail">${s.detail}</div>
      <div style="margin-top:6px;"><span style="color:${c};font-size:11px;font-weight:700;">${s.impact} IMPACT</span></div>
    </div>`;
  }).join('');

  const linkedinHtml = linkedin ? `
    <div class="linkedin-card">
      <div class="card-title">🔗 LinkedIn Profile Review</div>
      <div style="margin-bottom:16px;background:#111827;border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:#64748b;font-size:13px;">Profile Score</span>
        <span style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#2563eb;">${linkedin.score}/100</span>
      </div>
      ${linkedin.tips.map(t => `<div class="linkedin-tip">
        <div class="tip-icon">${t.icon}</div>
        <div class="tip-body">
          <h4>${t.title} <span class="${t.priority==='High'?'priority-high':'priority-med'}">[${t.priority}]</span></h4>
          <p>${t.detail}</p>
        </div>
      </div>`).join('')}
    </div>` : '';

  document.getElementById('results').innerHTML = `
    <div class="score-hero">
      <div class="score-num" style="color:${scoreColor}">${Math.round(score)}</div>
      <div class="score-label">ATS Compatibility Score</div>
      <div class="score-tier" style="background:${tierBg};color:${scoreColor}">${tier}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${score}%;background:${scoreColor};"></div></div>
    </div>
    ${linkedinHtml}
    <div class="grid2">
      <div class="card"><div class="card-title">🛠 Skills Detected (${(parsed.skills||[]).length})</div>${skillsHtml||'<span style="color:#64748b">None detected</span>'}</div>
      <div class="card"><div class="card-title">✅ Matched Keywords</div>${matchedHtml}</div>
      <div class="card"><div class="card-title">❌ Missing Keywords</div>${missingHtml}</div>
      <div class="card"><div class="card-title">💼 Job Role Matches</div>${jobsHtml}</div>
    </div>
    <div class="card" style="margin-bottom:24px;"><div class="card-title">💡 AI Improvement Suggestions</div>
      <div style="color:#64748b;font-size:14px;font-style:italic;margin-bottom:16px;">${suggestions.summary||''}</div>
      ${suggHtml}
    </div>
    <div style="text-align:center;padding:20px 0;">
      <a href="/dashboard" style="color:#60a5fa;text-decoration:none;font-size:14px;">← Back to Dashboard</a>
    </div>
  `;
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
