<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — CareerPro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050810; color: #f1f5f9; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.bg { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.12) 0%, transparent 70%); pointer-events: none; }
.card { background: #0c1220; border: 1px solid #1e2d45; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; position: relative; z-index: 1; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; text-align: center; margin-bottom: 8px; }
.logo span { color: #2563eb; }
.subtitle { text-align: center; color: #64748b; font-size: 15px; margin-bottom: 36px; }
.form-group { margin-bottom: 20px; }
label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #94a3b8; }
input { width: 100%; padding: 12px 16px; background: #111827; border: 1px solid #1e2d45; border-radius: 10px; color: #f1f5f9; font-size: 15px; outline: none; transition: border-color 0.2s; }
input:focus { border-color: #2563eb; }
.btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #2563eb, #7c3aed); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
.btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,0.3); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.link-row { text-align: center; margin-top: 24px; color: #64748b; font-size: 14px; }
.link-row a { color: #60a5fa; text-decoration: none; }
.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
.note { background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.2); color: #93c5fd; padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; text-align: center; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">Career<span>Pro</span></div>
  <p class="subtitle">Create your account — get started in minutes</p>
  <div class="note">🎯 One-time payment of ₹499 for lifetime access</div>
  <div class="error" id="error"></div>
  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Abhishek Kumar" />
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min. 6 characters" />
  </div>
  <button class="btn" id="regBtn" onclick="doRegister()">Create Account →</button>
  <div class="link-row">Already have an account? <a href="/login">Sign in</a></div>
</div>
<script>
async function doRegister() {
  const btn = document.getElementById('regBtn');
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!name || !email || !password) { showError('Please fill all fields'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name, email, password}) });
    const data = await res.json();
    if (data.success) { window.location.href = data.redirect; }
    else { showError(data.error || 'Registration failed'); btn.disabled = false; btn.textContent = 'Create Account →'; }
  } catch(e) { showError('Something went wrong'); btn.disabled = false; btn.textContent = 'Create Account →'; }
}
function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.style.display = 'block'; }
</script>
</body>
</html>
